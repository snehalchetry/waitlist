    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#7F1D1D',
                            accent: '#EAB308',
                            dark: '#1C0505',
                            maroon: '#450A0A',
                            rose: '#FB7185',

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(239, 68, 68, 0.12);
            box-shadow: 0 0 15px rgba(127, 29, 29, 0.06);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .glass-card:hover {
            border-color: rgba(251, 113, 133, 0.25);
            box-shadow: 0 0 25px rgba(127, 29, 29, 0.12), 0 0 60px rgba(234, 179, 8, 0.04);
        }

        .glow-overlay {
            background:
                radial-gradient(ellipse at 50% -10%, rgba(153, 27, 27, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 85% 70%, rgba(234, 179, 8, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 10% 50%, rgba(251, 113, 133, 0.1) 0%, transparent 30%),
                radial-gradient(ellipse at 50% 100%, rgba(127, 29, 29, 0.3) 0%, transparent 45%);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.45;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(1.04);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes colorShift {
            0% {
                filter: hue-rotate(0deg) brightness(1);
            }

            50% {
                filter: hue-rotate(8deg) brightness(1.08);
            }

            100% {
                filter: hue-rotate(0deg) brightness(1);
            }
        }

        @keyframes borderGlow {

            0%,
            100% {
                border-color: rgba(239, 68, 68, 0.12);
            }

            50% {
                border-color: rgba(234, 179, 8, 0.3);
            }
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        .pulse-glow {
            animation: pulseGlow 5s ease-in-out infinite;
        }

        .color-shift {
            animation: colorShift 8s ease-in-out infinite;
        }

        .border-glow {
            animation: borderGlow 3s ease-in-out infinite;
        }

        .text-shimmer {
            background: linear-gradient(90deg, #e2e8f0 0%, #EAB308 30%, #FB7185 50%, #EAB308 70%, #e2e8f0 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
    </style>
